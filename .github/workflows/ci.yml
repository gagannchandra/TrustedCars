name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: trustedcars_user
          POSTGRES_PASSWORD: trustedcars_password
          POSTGRES_DB: trustedcars_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx mypy ruff black

    - name: Check code formatting (Black)
      run: |
        cd backend
        black --check app/ tests/

    - name: Lint with Ruff
      run: |
        cd backend
        ruff check app/ tests/

    - name: Type check with Mypy
      run: |
        cd backend
        mypy app/

    - name: Check Alembic Migration Drift
      run: |
        cd backend
        export DATABASE_URL=postgresql+asyncpg://trustedcars_user:trustedcars_password@localhost:5432/trustedcars_db
        alembic check

    - name: Test with pytest
      run: |
        cd backend
        export DATABASE_URL=postgresql+asyncpg://trustedcars_user:trustedcars_password@localhost:5432/trustedcars_db
        export REDIS_URL=redis://localhost:6379/0
        export SECRET_KEY=test_secret_key_for_ci
        pytest tests/
