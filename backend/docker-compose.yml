# ============================================================================
# TrustedCars Docker Compose Configuration (OPTIONAL FOR PRODUCTION)
# ============================================================================
#
# ⚠️  IMPORTANT: Docker is NOT REQUIRED for local development!
#
# This application is designed for native local development using services
# installed directly on your machine (PostgreSQL, Redis, MinIO). See README.md
# for native setup instructions.
#
# This docker-compose.yml file is provided for:
#   ✅ Production deployments (containerized infrastructure)
#   ✅ CI/CD pipelines (consistent test environments)
#   ✅ Team members who prefer Docker for local development (optional)
#
# For local development, we recommend the native setup which provides:
#   • Direct access to services for debugging
#   • Faster iteration without container overhead
#   • Simpler troubleshooting with native tools
#   • No Docker daemon resource usage
#
# Usage (if deploying with Docker):
#   docker-compose up -d
#
# For production deployments:
#   • Consider using managed services (AWS RDS, ElastiCache, S3)
#   • See PRODUCTION_DEPLOYMENT.md for deployment best practices
#   • Review the production checklist at the end of this file
#
# ============================================================================

version: '3.8'

# ============================================================================
# WHEN TO USE DOCKER VS NATIVE DEVELOPMENT
# ============================================================================
#
# USE NATIVE DEVELOPMENT (Recommended):
#   ✅ Day-to-day local development
#   ✅ Debugging database queries directly with psql
#   ✅ Inspecting Redis state with redis-cli
#   ✅ Fast iteration without container rebuilds
#   ✅ Lower resource usage on development machine
#   ✅ Access to native profiling and debugging tools
#
# USE DOCKER:
#   ✅ Production deployments (Kubernetes, ECS, Docker Swarm)
#   ✅ CI/CD pipelines (GitHub Actions, GitLab CI, Jenkins)
#   ✅ Testing exact production-like environments locally
#   ✅ Quick team onboarding when native setup is blocked
#   ✅ Cross-platform consistency for distributed teams
#
# NOTE: The Dockerfile is kept for building production container images.
# You can use Docker for production while developing natively.
#
# ============================================================================

services:
  db:
    # ========================================================================
    # PostgreSQL 15 Database
    # ========================================================================
    # LOCAL DEVELOPMENT: Install PostgreSQL natively instead of using Docker
    #   macOS: brew install postgresql@15
    #   Linux: apt install postgresql-15
    #   See README.md for detailed native setup instructions
    #
    # PRODUCTION: Use managed database service (AWS RDS, DigitalOcean, etc.)
    #   Remove this service and configure DATABASE_URL in api/worker
    #
    # This service is ONLY for:
    #   • Docker-based production deployments
    #   • CI/CD test environments
    # ========================================================================
    image: postgres:15-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "log_statement=ddl"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # For pg_dump backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # NO PORT MAPPING - internal only

  redis:
    # ========================================================================
    # Redis 7 Cache
    # ========================================================================
    # LOCAL DEVELOPMENT: Install Redis natively instead of using Docker
    #   macOS: brew install redis
    #   Linux: apt install redis-server
    #   See README.md for detailed native setup instructions
    #
    # PRODUCTION: Use managed Redis service (AWS ElastiCache, Redis Cloud)
    #   Remove this service and configure REDIS_URL in api/worker
    #
    # This service is ONLY for:
    #   • Docker-based production deployments
    #   • CI/CD test environments
    # ========================================================================
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # NO PORT MAPPING - internal only

  minio:
    # ========================================================================
    # MinIO S3-Compatible Storage
    # ========================================================================
    # LOCAL DEVELOPMENT: Install MinIO natively instead of using Docker
    #   macOS: brew install minio/stable/minio
    #   Linux: Download binary from https://min.io/download
    #   See README.md for detailed native setup instructions
    #
    # PRODUCTION: Use AWS S3 instead of MinIO
    #   Remove this service and configure AWS credentials in api/worker
    #   Set S3_ENDPOINT_URL to empty or remove it entirely
    #
    # This service is ONLY for:
    #   • Docker-based development (if you prefer Docker over native)
    #   • CI/CD test environments
    # ========================================================================
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Only expose console on internal network
    # NO PORT MAPPING - use reverse proxy

  api:
    image: ${DOCKER_REGISTRY}/trustedcarz-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Development port mapping
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SENTRY_DSN=${SENTRY_DSN}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
      - APP_NAME=${APP_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - DISABLE_OTP_AUTH=${DISABLE_OTP_AUTH:-false}
      - DATABASE_POOL_SIZE=50
      - DATABASE_MAX_OVERFLOW=100
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/live', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Development: Single replica with port mapping
    # Production: Multiple replicas behind load balancer (remove port mapping)

  worker:
    image: ${DOCKER_REGISTRY}/trustedcarz-api:${IMAGE_TAG:-latest}
    command: ["python", "worker_main.py"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - APP_NAME=${APP_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
      - DISABLE_OTP_AUTH=${DISABLE_OTP_AUTH:-false}
      - DATABASE_POOL_SIZE=20
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Development: Single worker
    # Production: Multiple workers for reliability

  # Reverse proxy (Nginx) - Production only
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# Production Networks
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# PRODUCTION DEPLOYMENT CHECKLIST
# ============================================================================
# [ ] Use managed database (AWS RDS, DigitalOcean Managed Database)
# [ ] Use managed Redis (AWS ElastiCache, Redis Cloud)
# [ ] Use AWS S3 instead of MinIO
# [ ] Configure SSL/TLS certificates (Let's Encrypt, ACM)
# [ ] Set all environment variables from secrets manager
# [ ] Configure proper CORS_ORIGINS (production domain only)
# [ ] Set up monitoring (CloudWatch, Datadog, Prometheus)
# [ ] Configure log aggregation (CloudWatch Logs, ELK, Datadog)
# [ ] Set up automated backups (pg_dump, AWS RDS snapshots)
# [ ] Configure auto-scaling (AWS ECS, Kubernetes HPA)
# [ ] Set up CDN (CloudFlare, AWS CloudFront)
# [ ] Enable WAF (AWS WAF, CloudFlare)
# [ ] Configure DDoS protection (AWS Shield, CloudFlare)
# [ ] Set up alerting (PagerDuty, OpsGenie)
# [ ] Document runbook for common issues
# [ ] Perform load testing before launch

# ============================================================================
# DOCKER USAGE GUIDE
# ============================================================================
#
# FOR LOCAL DEVELOPMENT:
# ----------------------
# We recommend NATIVE installation (not Docker) for daily development:
#
#   1. Install PostgreSQL 15 natively (brew install postgresql@15)
#   2. Install Redis 7 natively (brew install redis)
#   3. Install MinIO natively (brew install minio/stable/minio)
#   4. Run backend directly: uvicorn app.main:app --reload
#   5. Run frontend dev server: npm run dev
#
# See README.md section "Local Development Setup" for complete instructions.
#
# Benefits of native development:
#   • Faster iteration (no container rebuilds)
#   • Direct debugging access (psql, redis-cli, minio console)
#   • Lower resource usage
#   • Simpler troubleshooting
#
# WHEN TO USE THIS DOCKER COMPOSE FILE:
# --------------------------------------
# 
# 1. CI/CD Pipelines:
#    Use Docker to create consistent test environments in GitHub Actions,
#    GitLab CI, or Jenkins. Example:
#
#      docker-compose up -d db redis minio
#      pytest tests/
#      docker-compose down
#
# 2. Production Deployments (Self-Hosted):
#    If deploying to your own infrastructure with Docker/Kubernetes:
#
#      docker-compose up -d
#
#    Or build images for Kubernetes:
#
#      docker build -t myregistry/trustedcars-api:v1.0.0 .
#      docker push myregistry/trustedcars-api:v1.0.0
#
# 3. Team Member Preference:
#    Some team members may prefer Docker for local development.
#    This is supported but not recommended for daily iteration.
#
# 4. Quick Testing of Production-Like Environment:
#    Test the full containerized stack locally before deployment:
#
#      docker-compose up -d
#      # Test integrated app at http://localhost:8000
#      docker-compose down
#
# THE DOCKERFILE:
# ---------------
# The Dockerfile (backend/Dockerfile) is KEPT for building production
# container images. You can use it to:
#
#   • Build images for AWS ECS, Azure Container Instances, Google Cloud Run
#   • Build images for Kubernetes deployments
#   • Create consistent production artifacts in CI/CD
#
# The Dockerfile is used even if you develop natively. Docker is a
# deployment target, not a development requirement.
#
# EXAMPLE: Native Development + Docker Production
# ------------------------------------------------
# Most teams do this:
#
#   Local development:
#     • PostgreSQL installed via brew
#     • Redis installed via brew
#     • MinIO installed via brew or using AWS S3
#     • Backend runs with: uvicorn app.main:app --reload
#     • Frontend runs with: npm run dev
#
#   Production deployment:
#     • Backend built as Docker image: docker build -t api:latest .
#     • Deployed to AWS ECS or Kubernetes
#     • Uses AWS RDS (PostgreSQL), ElastiCache (Redis), S3 (storage)
#     • No MinIO, no PgBouncer, no self-hosted services
#
# This gives you the best of both worlds:
#   • Fast native development iteration
#   • Reliable containerized production deployment
#
# ============================================================================
