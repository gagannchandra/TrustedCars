version: '3.8'

services:
  db:
    image: postgres:15-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: trustedcars_user
      POSTGRES_PASSWORD: trustedcars_password
      POSTGRES_DB: trustedcars_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustedcars_user -d trustedcars_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trustedcars_user:trustedcars_password@db:5432/trustedcars_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
