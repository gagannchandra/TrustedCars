version: '3.8'

services:
  db:
    image: postgres:15-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: trustedcars_user
      POSTGRES_PASSWORD: trustedcars_password
      POSTGRES_DB: trustedcars_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustedcars_user -d trustedcars_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb myminio/trustedcars-images --ignore-existing &&
      mc anonymous set public myminio/trustedcars-images
      "

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DB_USER=trustedcars_user
      - DB_PASSWORD=trustedcars_password
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=trustedcars_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://trustedcars_user:trustedcars_password@pgbouncer:5432/trustedcars_db
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_POOL_SIZE=5
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - pgbouncer
      - redis

  worker:
    build: .
    command: ["python", "worker_main.py"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://trustedcars_user:trustedcars_password@pgbouncer:5432/trustedcars_db
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_POOL_SIZE=5
      - S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - pgbouncer
      - redis

volumes:
  postgres_data:
  minio_data:
