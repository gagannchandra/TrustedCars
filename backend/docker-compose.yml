# Production Docker Compose Configuration
# This file extends the base docker-compose.yml for production deployments
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  db:
    # Production: Use managed database (AWS RDS, DigitalOcean, etc.)
    # Remove this service and configure DATABASE_URL in api/worker to point to managed DB
    image: postgres:15-alpine
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "log_statement=ddl"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # For pg_dump backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # NO PORT MAPPING - internal only

  redis:
    # Production: Use managed Redis (AWS ElastiCache, Redis Cloud, etc.)
    # Remove this service and configure REDIS_URL in api/worker
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    # NO PORT MAPPING - internal only

  minio:
    # Production: Use AWS S3 instead
    # Remove this service and configure AWS credentials in api/worker
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Only expose console on internal network
    # NO PORT MAPPING - use reverse proxy

  api:
    image: ${DOCKER_REGISTRY}/trustedcarz-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Development port mapping
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - SENTRY_DSN=${SENTRY_DSN}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
      - APP_NAME=${APP_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - DISABLE_OTP_AUTH=${DISABLE_OTP_AUTH:-false}
      - DATABASE_POOL_SIZE=50
      - DATABASE_MAX_OVERFLOW=100
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/live', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # Development: Single replica with port mapping
    # Production: Multiple replicas behind load balancer (remove port mapping)

  worker:
    image: ${DOCKER_REGISTRY}/trustedcarz-api:${IMAGE_TAG:-latest}
    command: ["python", "worker_main.py"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MFA_ENCRYPTION_KEY=${MFA_ENCRYPTION_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - APP_NAME=${APP_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - METRICS_PASSWORD=${METRICS_PASSWORD}
      - DISABLE_OTP_AUTH=${DISABLE_OTP_AUTH:-false}
      - DATABASE_POOL_SIZE=20
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Development: Single worker
    # Production: Multiple workers for reliability

  # Reverse proxy (Nginx) - Production only
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# Production Networks
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# PRODUCTION DEPLOYMENT CHECKLIST:
# [ ] Use managed database (AWS RDS, DigitalOcean Managed Database)
# [ ] Use managed Redis (AWS ElastiCache, Redis Cloud)
# [ ] Use AWS S3 instead of MinIO
# [ ] Configure SSL/TLS certificates (Let's Encrypt, ACM)
# [ ] Set all environment variables from secrets manager
# [ ] Configure proper CORS_ORIGINS (production domain only)
# [ ] Set up monitoring (CloudWatch, Datadog, Prometheus)
# [ ] Configure log aggregation (CloudWatch Logs, ELK, Datadog)
# [ ] Set up automated backups (pg_dump, AWS RDS snapshots)
# [ ] Configure auto-scaling (AWS ECS, Kubernetes HPA)
# [ ] Set up CDN (CloudFlare, AWS CloudFront)
# [ ] Enable WAF (AWS WAF, CloudFlare)
# [ ] Configure DDoS protection (AWS Shield, CloudFlare)
# [ ] Set up alerting (PagerDuty, OpsGenie)
# [ ] Document runbook for common issues
# [ ] Perform load testing before launch
