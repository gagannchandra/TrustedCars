services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trustedcars
      POSTGRES_PASSWORD: trustedcars
      POSTGRES_DB: trustedcars
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustedcars"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://trustedcars:trustedcars@db:5432/trustedcars
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
      DEMO_OTP: "123456"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the bundle at build time.
        VITE_API_URL: http://localhost:4000/api/v1
        VITE_DEMO_MODE: "false"
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
