services:
  - type: web
    name: trustedcars-api
    env: node
    buildCommand: npm install --omit=dev
    startCommand: node backend/src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trustedcars-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "https://your-frontend-domain.vercel.app"
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"

databases:
  - name: trustedcars-db
    databaseName: trustedcars
    user: trustedcars
